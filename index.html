<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MHGen/MHX Save Manager</title>

<link rel="shortcut icon" href="assets/favicon.ico">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/drag.css">

</head>
<body>
<script src="scripts/MHGEN_CLEAN.js"></script>
<script src="scripts/MHX_CLEAN.js"></script>
<script src="scripts/MHXX_3DS_CLEAN.js"></script>
<script src="scripts/MHXX_SWITCH.js"></script>
<script src="scripts/MHGU.js"></script>
<script src="scripts/DLC_DATA.js"></script>
<script src="scripts/DLC_GROUPS.js"></script>
<script src="scripts/SAVE_CORE.js"></script>
<script src="scripts/ITEM_ID_MAP.js"></script>
<script src="scripts/MHXX_PORT.js"></script>
<script src="scripts/drag.js"></script>

<center>
<span class="menu">
<button onclick="newSave()" style="height: 32px;">New save</button>
<button onclick="loadSave()" style="height: 32px;">Load save</button>
<button onclick="openDLCWindow()" style="height: 32px;">Inject DLC</button>
</span>
<span id="DL"></span>
<input type="file" id="loadSave" style="display:none;" onchange="readSave(event)">
</center>

<div class="main">
<div id="saveTable" class="save-table list js-list"></div>

<div id="popup-window" class="popup-window">
	<span class="close-popup-button" onclick="closeWindow()">&times;</span>
	<div id="popup"></div>
</div>
<div id="popup-window-overlay" class="popup-window-overlay" onClick="closeWindow()"></div>
</div>
<div id="footer" class="footer"></div>
<script src="scripts/main.js"></script>
</body>
</html>
